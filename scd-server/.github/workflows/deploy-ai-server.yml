name: Deploy ai-server

on:
  push:
    branches: [main]
    paths:
      - "apps/ai-server/**"
      - ".github/workflows/deploy-ai-server.yml"
  workflow_dispatch: {}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: apps/ai-server
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/scd-ai-server:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/scd-ai-server:${{ github.sha }}

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AI_SERVER_HOST }}
          username: ec2-user
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/scd-ai-server:latest
            docker stop scd-ai-server || true
            docker rm scd-ai-server || true
            docker run -d \
              --name scd-ai-server \
              --restart unless-stopped \
              -p 8070:8070 \
              -e PORT=8070 \
              -e KAFKA_BROKERS='${{ secrets.KAFKA_BROKERS }}' \
              -e KAFKA_CONSUMER_GROUP_ID=ai-server \
              -e KAFKA_TOPIC_CONSUME=message \
              -e KAFKA_TOPIC_PRODUCE=message.language_detected \
              -e OPENAI_API_KEY='${{ secrets.OPENAI_API_KEY }}' \
              -e OPENAI_MODEL=gpt-4o-mini \
              -e REDIS_URL='${{ secrets.REDIS_URL }}' \
              -e REDIS_PASSWORD='${{ secrets.REDIS_PASSWORD }}' \
              ${{ secrets.DOCKERHUB_USERNAME }}/scd-ai-server:latest
