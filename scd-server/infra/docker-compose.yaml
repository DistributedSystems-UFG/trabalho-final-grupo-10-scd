name: scd
services:
  kafka:
    image: apache/kafka:3.7.0
    ports:
      - "9094:9094"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - CLUSTER_ID=5L6g3nShT-eMCtK--X86sw
    volumes:
      - kafka_data:/var/lib/kafka/data
    restart: unless-stopped
    networks:
      - app-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list",
        ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "${KAFKA_UI_PORT:-8082}:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=local
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092
    restart: unless-stopped
    networks:
      - app-network
    depends_on:
      kafka:
        condition: service_healthy

  server-api:
    build:
      context: ../apps/server
      dockerfile: Dockerfile
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - PORT=${PORT:-3000}
      - GO_ENV=${GO_ENV:-development}
      - POSTGRES_DB=${POSTGRES_DB:-postgres}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_HOST=${POSTGRES_HOST:-server-db}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}

      # Database
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:postgres@server-db:5432/postgres?sslmode=disable}
      - DATABASE_URL_REPLICA=${DATABASE_URL_REPLICA:-postgresql://postgres:postgres@server-db:5432/postgres?sslmode=disable}

      # Redis
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_URL=${REDIS_URL:-server-redis:6379}
      - REDIS_TTL_SECONDS=${REDIS_TTL_SECONDS:-3600}

      # Kafka
      - KAFKA_BROKERS=${KAFKA_BROKERS:-kafka:9092}

    depends_on:
      server-redis:
        condition: service_started
      server-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-network

  server-db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-postgres}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    restart: unless-stopped
    networks:
      - app-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-postgres}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  server-redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - app-network
    command: redis-server --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"

  socket-server:
    build:
      context: ../apps/socket-server
      dockerfile: Dockerfile
    ports:
      - "${SOCKET_PORT:-8765}:8765"
    environment:
      - PORT=${SOCKET_PORT:-8765}
      - KAFKA_BROKERS=${KAFKA_BROKERS:-kafka:9092}
    depends_on:
      server-redis:
        condition: service_started
      kafka:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-network

  ai-server:
    build:
      context: ../apps/ai-server
      dockerfile: Dockerfile
    ports:
      - "${PORT:-8070}:${PORT:-8070}"
    environment:
      - PORT=${PORT:-8070}
      - KAFKA_BROKERS=${KAFKA_BROKERS:-kafka:9092}
      - OPENAI_API_KEY=${OPENAI_API_KEY}

    depends_on:
      kafka:
        condition: service_healthy
      server-redis:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import requests; requests.get('http://localhost:${PORT:-8070}/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  redis_data:
    driver: local
  postgres_data:
    driver: local
  kafka_data:
    driver: local
